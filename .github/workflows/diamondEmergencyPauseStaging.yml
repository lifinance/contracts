# EMERGENCY >> Pause STAGING diamonds (multi-network test)
# - Manually-triggered (workflow_dispatch) end-to-end test of the emergency-pause WRITE path
#   against the STAGING diamonds on bsc/arbitrum/optimism/base. Runs the frozen break-glass
#   script (script/emergency/emergencyPauseBreakGlass.sh) with ENVIRONMENT=staging — the exact
#   same script and write path prod uses.
# - Purpose (EXSC-368 option c): the write path is NOT covered by the read-only
#   verifyEmergencyPauseReadiness workflow, so this exercises the real direct-send dispatch the
#   prod pause relies on — continuous proof the frozen break-glass path works on real chains.
# - Does NOT auto-unpause: a human runs this as a drill and unpauses staging manually afterwards.
# - Slack: posts a TEST-prefixed status (success/failure) with a GH run link and the runbook URL
#   (EMERGENCY_PAUSE_RUNBOOK_URL repository variable) to a dedicated staging-drill test channel
#   (SLACK_WEBHOOK_PAUSE_STAGING_TEST secret) on every run, so the drill never spams SC-general.
# - Known limitations: needs RPCs (MongoDB) + staging deploy logs + the PRIV_KEY_PAUSER_WALLET_STAGING
#   secret. DiamondPauser team-membership check is intentionally disabled for the staging drill.

name: EMERGENCY >> Pause STAGING diamonds (multi-network test)

on:
  workflow_dispatch:
    inputs:
      warning:
        description: "By clicking the next button you are pausing the STAGING diamonds on bsc/arbitrum/optimism/base. Please proceed with extreme caution !!! You must type 'UNDERSTOOD' to proceed"
        required: true

permissions:
  contents: read # required to fetch repository contents
  actions: read # required to resolve the current job ID for the Slack deep-link

jobs:
  diamond-emergency-pause:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: package.json

      - name: Install dev dependencies
        run: bun install

      - name: Check input
        if: ${{ inputs.warning != 'UNDERSTOOD' }}
        run: |
          echo -e "\033[31mYou must type 'UNDERSTOOD' to proceed. Please try again. \033[0m"
          exit 1

      - name: Authenticate git user (check membership in 'DiamondPauser' group)
        if: ${{ inputs.warning == 'UNDERSTOOD' }}
        id: authenticate-user
        uses: tspascoal/get-user-teams-membership@57e9f42acd78f4d0f496b3be4368fc5f62696662 # v3.0.0
        with:
          username: ${{ github.actor }}
          organization: lifinance
          team: diamondpauser
          GITHUB_TOKEN: ${{ secrets.GIT_ACTIONS_BOT_PAT_CLASSIC }}

      # Commented out to skip authentication for staging pauser. For production github account has to be added to DiamondPauser team.
      # - name: Check team membership
      #   if: ${{ inputs.warning == 'UNDERSTOOD' }}
      #   run: |
      #     if [[ "${{ steps.authenticate-user.outputs.isTeamMember }}" != "true" ]]; then
      #       echo -e "\033[31mUser ${{ github.actor }} is not a member of the DiamondPauser team. Please ask one of the team members to execute this action:\033[0m"
      #       echo "https://github.com/orgs/lifinance/teams/diamondpauser/members"
      #       exit 1
      #     else
      #       echo -e "\033[32mUser is a member of the DiamondPauser team and may execute this action\033[0m"
      #     fi

      - name: Install Foundry
        uses: ./.github/actions/setup-foundry

      - name: Fetch RPC endpoints from MongoDB
        run: |
          # Run the fetch-rpcs.ts script to update .env with RPC endpoint variables
          # This will fetch prioritized RPCs from MongoDB, or fall back to public RPCs from networks.json if MongoDB is unavailable
          bun fetch-rpcs
          # Only inject RPC endpoint variables into the GitHub Actions environment.
          # Mask the URL (which may carry an API key) before forwarding so it is
          # redacted from all subsequent log output for the rest of the run.
          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ "$line" =~ ^ETH_NODE_URI_ ]]; then
              value="${line#*=}"
              if [[ "$value" == \"*\" ]]; then value="${value:1:-1}"; fi
              if [[ "$value" == \'*\' ]]; then value="${value:1:-1}"; fi
              echo "::add-mask::$value"
              echo "$line" >> "$GITHUB_ENV"
            fi
          done < ".env"
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Pause Diamond
        # Same frozen break-glass script as prod, run with ENVIRONMENT=staging so this dry-run
        # exercises the identical write path on the staging diamonds (EXSC-368 c).
        run: bash script/emergency/emergencyPauseBreakGlass.sh
        env:
          ENVIRONMENT: staging
          PRIVATE_KEY_PAUSER_WALLET: ${{ secrets.PRIV_KEY_PAUSER_WALLET_STAGING }}

      # Resolve a deep-link to the current job's log view so the Slack message
      # lets on-call open logs in one click. Falls back to the run-level URL if
      # the API call fails so the notification still contains a usable link.
      - name: Resolve current job URL
        if: ${{ always() }}
        id: jobinfo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          job_id=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            --jq ".jobs[] | select(.name == \"${{ github.job }}\") | .id" 2>/dev/null || true)
          if [[ -n "${job_id}" ]]; then
            url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${job_id}"
          else
            url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Notify Slack staging-drill test channel of pause execution
        # always() so the alert fires even when the pause script exits non-zero
        # (per-network isolation now lets the script partially succeed and still
        # return 1 — on-call must still be paged in that case).
        if: ${{ always() }}
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d # v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_PAUSE_STAGING_TEST }}
          webhook-type: incoming-webhook
          # JSON payload so the inline ternary for status emoji interpolates
          # cleanly without YAML's single-quote escaping. \n produces line breaks in
          # the rendered Slack message. Runbook URL comes from the EMERGENCY_PAUSE_RUNBOOK_URL
          # repository variable (shared with the prod workflow) so moving the runbook never
          # needs a workflow edit (EXSC-371/EXSC-432).
          payload: |
            {
              "text": "TEST TEST TEST ATTENTION - the emergency diamond pause action was just executed on STAGING (bsc/arbitrum/optimism/base) by ${{ github.actor }}\nStatus: ${{ job.status == 'success' && 'Success ✅' || 'Failed ❌' }}\nGH run: ${{ steps.jobinfo.outputs.url }}\nRunbook: ${{ vars.EMERGENCY_PAUSE_RUNBOOK_URL || 'not configured — set the EMERGENCY_PAUSE_RUNBOOK_URL repository variable (EXSC-371/EXSC-432)' }}"
            }
