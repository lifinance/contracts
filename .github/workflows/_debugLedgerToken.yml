# Debug: LEDGER_SYNC_TOKEN health check
# - Purpose: Diagnose ERC-7730 sync failures without running the full sync. Isolates whether the `LEDGER_SYNC_TOKEN` repo secret is present, valid, identifies the expected account, and has push access to the fork.
# - Triggers: push to `test/ledger-sync-**` branches (iteration-friendly; no merge required) and manual dispatch from main (long-term self-service token-health check).
# - Safety: prints only token length and HTTP status codes — never the token value or any portion of it. Performs no write operations.
# - Lifetime: leading underscore in filename marks this as a diagnostic, not a production workflow. Safe to keep on main as a self-service health check.

name: _Debug LEDGER_SYNC_TOKEN

on:
  workflow_dispatch:
  push:
    branches:
      - 'test/ledger-sync-**'
    paths:
      - '.github/workflows/_debugLedgerToken.yml'
      - '.github/workflows/syncLedgerClearSigning.yml'

permissions:
  contents: read

jobs:
  debug-token:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (mirrors sync workflow setup)
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false # match sync workflow — this is part of what we're diagnosing

      - name: Diagnose LEDGER_SYNC_TOKEN
        env:
          LEDGER_SYNC_TOKEN: ${{ secrets.LEDGER_SYNC_TOKEN }}
          LEDGER_FORK: lifinance/clear-signing-erc7730-registry
        run: |
          set -uo pipefail # no -e: we want every diagnostic step to run even if an earlier one fails

          echo "=== Step 1: secret presence ==="
          if [ -z "${LEDGER_SYNC_TOKEN:-}" ]; then
            echo "FAIL: LEDGER_SYNC_TOKEN is empty or unset"
            exit 1
          fi
          # Token length is non-sensitive — classic PATs are 40 chars, fine-grained are ~93, GitHub App tokens are ~40+. Useful sanity check.
          echo "OK: token length = ${#LEDGER_SYNC_TOKEN}"
          echo ""

          echo "=== Step 2: GitHub API /user reachability ==="
          USER_HTTP_CODE=$(curl -sS -o /tmp/user.json -w "%{http_code}" \
            -H "Authorization: bearer ${LEDGER_SYNC_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user)
          echo "HTTP ${USER_HTTP_CODE}"
          if [ "${USER_HTTP_CODE}" != "200" ]; then
            echo "FAIL: token rejected by /user (401 = expired/revoked, 403 = scope/SSO issue)"
            cat /tmp/user.json
          fi
          echo ""

          echo "=== Step 3: token identity ==="
          LOGIN=$(jq -r '.login // "unknown"' /tmp/user.json 2>/dev/null)
          TYPE=$(jq -r '.type // "unknown"' /tmp/user.json 2>/dev/null)
          echo "login: ${LOGIN}"
          echo "type:  ${TYPE}"
          echo ""

          echo "=== Step 4: fork access (${LEDGER_FORK}) ==="
          FORK_HTTP_CODE=$(curl -sS -o /tmp/fork.json -w "%{http_code}" \
            -H "Authorization: bearer ${LEDGER_SYNC_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${LEDGER_FORK}")
          echo "HTTP ${FORK_HTTP_CODE}"
          if [ "${FORK_HTTP_CODE}" = "200" ]; then
            jq '{full_name, private, fork, permissions}' /tmp/fork.json
          else
            echo "FAIL: cannot read fork metadata"
            cat /tmp/fork.json
          fi
          echo ""

          echo "=== Step 5: raw clone (the actual failing line in syncLedgerClearSigning.yml) ==="
          rm -rf /tmp/ledger-registry-clone-test
          if git clone --depth 1 "https://x-access-token:${LEDGER_SYNC_TOKEN}@github.com/${LEDGER_FORK}.git" /tmp/ledger-registry-clone-test 2>&1; then
            echo "OK: clone succeeded"
            ( cd /tmp/ledger-registry-clone-test && git log --oneline -1 )
          else
            echo "FAIL: clone failed"
          fi
          echo ""

          echo "=== Summary ==="
          echo "Step 2 (/user):       ${USER_HTTP_CODE}"
          echo "Step 4 (fork):        ${FORK_HTTP_CODE}"
          if [ "${USER_HTTP_CODE}" = "200" ] && [ "${FORK_HTTP_CODE}" = "200" ]; then
            echo "Token health: GREEN"
          else
            echo "Token health: RED — rotate LEDGER_SYNC_TOKEN in repo settings"
            exit 1
          fi
