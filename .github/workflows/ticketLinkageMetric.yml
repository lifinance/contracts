# Ticket Linkage Metric
#
# ============================================================================================
# ⚠️  TEMPORARY HIJACK — DO NOT MERGE TO main IN THIS STATE  ⚠️
# ============================================================================================
# On main this file is the monthly ticket-linkage metric. On this feature branch it has been
# TEMPORARILY replaced with the emergency break-glass pause logic so the staging pause drill can
# be dispatched WITHOUT merging anything to main: GitHub lets you dispatch an already-registered
# workflow against a feature-branch ref and runs that ref's copy of the file.
#
# Why hijack the metric workflow instead of diamondEmergencyPause.yml: borrowing the prod pause
# button risks neutering it on accidental merge. The ticket-linkage metric is non-critical and
# schedule-driven (its monthly run always uses main's UNCHANGED copy), so an accidental merge of
# this branch state only breaks a metric, never the prod pause.
#
# The `warning: UNDERSTOOD` gate is intentionally dropped: workflow_dispatch inputs are read from
# the DEFAULT branch, and main's copy of this workflow defines no inputs — so the drill dispatches
# with no inputs. It posts to the staging-drill test channel (SLACK_WEBHOOK_MICHAL_TEST).
#
# >>> TO REVERT (before merging): git checkout main -- .github/workflows/ticketLinkageMetric.yml
# ============================================================================================

name: Ticket Linkage Metric

on:
  workflow_dispatch: # TEMP-HIJACK: manual dispatch only for the staging pause drill

permissions:
  contents: read # required to fetch repository contents
  actions: read # required to resolve the current job ID for the Slack deep-link

jobs:
  diamond-emergency-pause:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: package.json

      - name: Install dev dependencies
        run: bun install

      - name: Install Foundry
        uses: ./.github/actions/setup-foundry

      - name: Fetch RPC endpoints from MongoDB
        run: |
          # Run the fetch-rpcs.ts script to update .env with RPC endpoint variables
          # This will fetch prioritized RPCs from MongoDB, or fall back to public RPCs from networks.json if MongoDB is unavailable
          bun fetch-rpcs
          # Only inject RPC endpoint variables into the GitHub Actions environment.
          # Mask the URL (which may carry an API key) before forwarding so it is
          # redacted from all subsequent log output for the rest of the run.
          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ "$line" =~ ^ETH_NODE_URI_ ]]; then
              value="${line#*=}"
              if [[ "$value" == \"*\" ]]; then value="${value:1:-1}"; fi
              if [[ "$value" == \'*\' ]]; then value="${value:1:-1}"; fi
              echo "::add-mask::$value"
              # Write the UNQUOTED value so GITHUB_ENV matches the masked value — a quoted .env
              # value would otherwise be stored with quotes and escape the ::add-mask:: redaction.
              echo "${line%%=*}=$value" >> "$GITHUB_ENV"
            fi
          done < ".env"
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Pause Diamond
        # Frozen, self-contained break-glass script (script/emergency/) — intentionally
        # independent of universalCast/helperFunctions so routing churn cannot break the pause.
        # TEMP-HIJACK: hardcoded to staging for the pre-merge dry-run.
        run: bash script/emergency/emergencyPauseBreakGlass.sh
        env:
          ENVIRONMENT: staging
          PRIVATE_KEY_PAUSER_WALLET: ${{ secrets.PRIV_KEY_PAUSER_WALLET_STAGING }}

      # Resolve a deep-link to the current job's log view so the Slack message
      # lets on-call open logs in one click. Falls back to the run-level URL if
      # the API call fails so the notification still contains a usable link.
      - name: Resolve current job URL
        if: ${{ always() }}
        id: jobinfo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          job_id=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            --jq ".jobs[] | select(.name == \"${{ github.job }}\") | .id" 2>/dev/null || true)
          if [[ -n "${job_id}" ]]; then
            url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${job_id}"
          else
            url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Notify Slack of pause execution
        # always() so the alert fires even when the pause script exits non-zero
        # (per-network isolation can partially succeed and still return 1).
        if: ${{ always() }}
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d # v2.0.0
        # TEMP-HIJACK: posts to the staging-drill test channel with a TEST message.
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_MICHAL_TEST }}
          webhook-type: incoming-webhook
          # JSON payload so the inline ternary for status emoji interpolates cleanly. \n produces
          # line breaks. Runbook URL from the EMERGENCY_PAUSE_RUNBOOK_URL repository variable
          # (EXSC-371/EXSC-432); when unset the message says so rather than rendering a broken link.
          payload: |
            {
              "text": "TEST TEST TEST ATTENTION - the emergency diamond pause action was just executed on STAGING (bsc/arbitrum/optimism/base) by ${{ github.actor }}\nStatus: ${{ job.status == 'success' && 'Success ✅' || 'Failed ❌' }}\nGH run: ${{ steps.jobinfo.outputs.url }}\nRunbook: ${{ vars.EMERGENCY_PAUSE_RUNBOOK_URL || 'not configured — set the EMERGENCY_PAUSE_RUNBOOK_URL repository variable (EXSC-371/EXSC-432)' }}"
            }
