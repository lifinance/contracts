# - Run (Foundry) Unit Test Suite
# - will make sure that all tests pass

name: Run Unit Tests
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main # makes sure that it runs on main branch after a PR has been merged

  # Allows to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read # required to fetch repository contents

jobs:
  run-unit-tests:
    # will only run once the PR is in "Ready for Review" state
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.7
        with:
          submodules: recursive

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dev dependencies
        run: bun install

      - name: Install Foundry
        uses: ./.github/actions/setup-foundry

      - name: Install forge Dependencies
        run: forge install

      - name: Fetch RPC endpoints from MongoDB
        run: |
          # Run the fetch-rpcs.ts script to update .env with RPC endpoint variables
          # This will fetch prioritized RPCs from MongoDB, or fall back to public RPCs from networks.json if MongoDB is unavailable
          bun fetch-rpcs
          # Only inject RPC endpoint variables into the GitHub Actions environment
          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ "$line" =~ ^ETH_NODE_URI_ ]]; then
              echo "$line" >> "$GITHUB_ENV"
            fi
          done < ".env"
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          
      - name: Run forge tests (up to 10 attempts, --rerun on retries)
        # Custom retry loop instead of Wandalen/wretry.action so retries run
        # `forge test --rerun` (only previously-failed tests) rather than the
        # full suite every time. Foundry persists the failed-test list in
        # cache/test-failures.json between invocations within this step.
        shell: bash
        run: |
          set -uo pipefail
          MAX_ATTEMPTS=10
          DELAY_SEC=15

          echo "::group::Attempt 1/${MAX_ATTEMPTS}: forge test"
          forge test
          EXIT_CODE=$?
          echo "::endgroup::"

          ATTEMPT=1
          while [ "${EXIT_CODE}" -ne 0 ] && [ "${ATTEMPT}" -lt "${MAX_ATTEMPTS}" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "forge test failed on attempt $((ATTEMPT - 1)); retrying with --rerun in ${DELAY_SEC}s"
            sleep "${DELAY_SEC}"
            echo "::group::Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: forge test --rerun"
            forge test --rerun
            EXIT_CODE=$?
            echo "::endgroup::"
          done

          if [ "${EXIT_CODE}" -ne 0 ]; then
            echo "::error::forge test failed after ${MAX_ATTEMPTS} attempts"
          fi
          exit "${EXIT_CODE}"
