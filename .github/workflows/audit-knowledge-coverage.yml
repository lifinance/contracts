# Audit Knowledge Coverage (EXP-481)
#
# Guards against `audit/auditLog.json` and `audit/knowledge/findings.json`
# drifting out of sync. When a PR adds a new audit (a new entry in
# auditLog.json or a new file under audit/reports/) it MUST also include
# the corresponding corpus update produced by /extract-audit-knowledge —
# otherwise the LF-NNN corpus the security-review pipeline (EXP-483)
# consumes is silently incomplete.
#
# Design notes:
# - This check is "delta-only" by design: it only fails on audits the
#   current PR introduced. Pre-existing drift (41 audits as of the
#   2026-05-22 baseline) is EXP-479 backfill work and not blocked here.
# - No AI invocation in CI. The actual /extract-audit-knowledge runs in
#   the developer's local Claude Code session (cheap + reviewable) and
#   the resulting corpus changes land in the same PR.
# - The check script lives at script/tasks/checkAuditKnowledgeCoverage.ts
#   and is reusable locally (run with --new-audits or no args).

name: Audit Knowledge Coverage

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'audit/auditLog.json'
      - 'audit/reports/**'
      - 'audit/knowledge/findings.json'

permissions:
  contents: read

concurrency:
  group: audit-knowledge-coverage-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check audit/knowledge/ coverage
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for base..head diff)
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Compute audit IDs introduced by this PR
        # Diff auditLog.json between the PR base and head, extracting only
        # the audit IDs added by this PR. We use `jq` against each side
        # rather than parsing the textual diff — that handles JSON re-
        # ordering / formatting without false positives.
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # If auditLog.json didn't exist on the base (unlikely), treat as empty.
          if git cat-file -e "${BASE_SHA}:audit/auditLog.json" 2>/dev/null; then
            git show "${BASE_SHA}:audit/auditLog.json" \
              | jq -r '.audits | keys[]' \
              | sort -u > /tmp/base_audits.txt
          else
            : > /tmp/base_audits.txt
          fi
          git show "${HEAD_SHA}:audit/auditLog.json" \
            | jq -r '.audits | keys[]' \
            | sort -u > /tmp/head_audits.txt
          NEW_AUDITS=$(comm -23 /tmp/head_audits.txt /tmp/base_audits.txt | paste -sd, -)
          echo "new_audits=${NEW_AUDITS}" >> "$GITHUB_OUTPUT"
          echo "::group::Audit-log delta"
          echo "base IDs:  $(wc -l < /tmp/base_audits.txt) total"
          echo "head IDs:  $(wc -l < /tmp/head_audits.txt) total"
          echo "new IDs:   ${NEW_AUDITS:-(none)}"
          echo "::endgroup::"

      - name: Verify coverage for new audits
        # PR mode of the check script: only fails on the IDs this PR
        # introduced. Pre-existing drift is reported as a "note" and
        # does not gate.
        # NEW_AUDITS routed via env (not direct template expansion) so the
        # value never gets shell-evaluated — zizmor template-injection safe.
        env:
          NEW_AUDITS: ${{ steps.diff.outputs.new_audits }}
        run: |
          set -euo pipefail
          bun script/tasks/checkAuditKnowledgeCoverage.ts \
            --new-audits "$NEW_AUDITS"
