# Verify Pauser Wallet matches config
# - Derives the address from the PRIV_KEY_PAUSER_WALLET secret (via `cast`) and asserts
#   it equals BOTH `pauserWallet` (EVM hex) and `tronWallets.pauserWallet` (Tron base58)
#   in config/global.json — the Tron value is checked directly, not assumed.
# - Guards the emergency-pause credential: GitHub secrets are write-only, so a
#   rotated / overwritten / fat-fingered key is otherwise invisible until the pause
#   is actually triggered. This turns that latent failure into a scheduled, loud one.
# - Tron has no `cast` base58 support, so the Tron address is derived here by
#   base58check-encoding the same key's bytes (0x41 || 20-byte address) using only
#   coreutils / openssl / bc.
# - Intentionally depends only on Foundry `cast` (pinned via .foundry-version) and
#   standard runner tools (jq, xxd, openssl, bc) — never on the npm/TS dependency
#   tree — so a viem/tronweb bump cannot break it.
# - Known limitations: validates the production key against this repo's config only; it
#   does not check on-chain state (see script/tasks/temp/checkEmergencyPausePerNetwork.ts).

name: Verify Pauser Wallet

on:
  schedule:
    - cron: '0 9 * * 4' # 09:00 UTC every Thursday
  workflow_dispatch: # manual trigger (e.g. after rotating the key or before a drill)
  pull_request:
    paths:
      - config/global.json # catch a fat-fingered edit to pauserWallet at review time

permissions:
  contents: read # required to checkout the repository and read config/global.json

jobs:
  verify-pauser-wallet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false # read-only check; no git push/tag/submodule operations

      - name: Install Foundry
        uses: ./.github/actions/setup-foundry

      - name: Verify derived pauser address matches config (EVM + Tron)
        env:
          PRIVATE_KEY_PAUSER_WALLET: ${{ secrets.PRIV_KEY_PAUSER_WALLET }}
        run: |
          set -euo pipefail

          # Fail clearly if the runner is missing a tool the check relies on, rather
          # than emitting a confusing mid-script error.
          for tool in cast jq xxd openssl bc; do
            command -v "${tool}" >/dev/null 2>&1 || {
              echo -e "\033[31mRequired tool '${tool}' not found on runner.\033[0m"; exit 1; }
          done

          # An unset/cleared secret is itself a drift we want to catch loudly.
          if [[ -z "${PRIVATE_KEY_PAUSER_WALLET}" ]]; then
            echo -e "\033[31mSecret PRIV_KEY_PAUSER_WALLET is empty or not set.\033[0m"
            exit 1
          fi

          # Derive the address from the secret. `cast` has no env/stdin input for a
          # raw key, so it must be passed as an argument; it is never echoed, cast
          # does not print the key on error, and the runner is ephemeral and
          # single-tenant, so the brief argv presence is not a practical leak.
          DERIVED="$(cast wallet address --private-key "${PRIVATE_KEY_PAUSER_WALLET}")"

          # `// empty` so a missing/null key yields a clear error below rather than
          # the literal string "null" silently masquerading as a MISMATCH.
          EXPECTED_EVM="$(jq -r '.pauserWallet // empty' config/global.json)"
          EXPECTED_TRON="$(jq -r '.tronWallets.pauserWallet // empty' config/global.json)"
          if [[ -z "${EXPECTED_EVM}" || -z "${EXPECTED_TRON}" ]]; then
            echo -e "\033[31mpauserWallet / tronWallets.pauserWallet missing or null in config/global.json.\033[0m"
            exit 1
          fi

          # Tron address = base58check(0x41 || 20-byte EVM address). `cast` has no
          # base58, so encode here with coreutils/openssl/bc (no npm/TS dependency).
          ADDR_HEX="$(echo "${DERIVED#0x}" | tr 'A-F' 'a-f')"
          PAYLOAD_HEX="41${ADDR_HEX}"
          CHECKSUM_HEX="$(printf '%s' "${PAYLOAD_HEX}" | xxd -r -p \
            | openssl dgst -sha256 -binary | openssl dgst -sha256 -binary \
            | xxd -p | tr -d '\n' | cut -c1-8)"
          ALPHABET="123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz"
          # 0x41-prefixed payload has no leading zero bytes, so no leading-'1' padding.
          DEC="$(echo "ibase=16; $(echo "${PAYLOAD_HEX}${CHECKSUM_HEX}" | tr 'a-f' 'A-F')" | bc)"
          DERIVED_TRON=""
          while [[ "${DEC}" != "0" ]]; do
            REM="$(echo "${DEC} % 58" | bc)"
            DERIVED_TRON="${ALPHABET:${REM}:1}${DERIVED_TRON}"
            DEC="$(echo "${DEC} / 58" | bc)"
          done

          echo "Derived (EVM)  : ${DERIVED}"
          echo "Derived (Tron) : ${DERIVED_TRON}"
          echo "Config  (EVM)  : ${EXPECTED_EVM}"
          echo "Config  (Tron) : ${EXPECTED_TRON}"

          FAILED=0
          # EVM: case-insensitive (EIP-55 checksum casing is cosmetic).
          if [[ "$(echo "${DERIVED}" | tr 'A-F' 'a-f')" != "$(echo "${EXPECTED_EVM}" | tr 'A-F' 'a-f')" ]]; then
            echo -e "\033[31mEVM MISMATCH: derived address != config pauserWallet.\033[0m"
            FAILED=1
          fi
          # Tron: case-SENSITIVE (base58 distinguishes case).
          if [[ "${DERIVED_TRON}" != "${EXPECTED_TRON}" ]]; then
            echo -e "\033[31mTRON MISMATCH: derived address != config tronWallets.pauserWallet.\033[0m"
            FAILED=1
          fi
          if [[ "${FAILED}" -ne 0 ]]; then
            echo -e "\033[31mThe emergency-pause workflow would sign with the wrong wallet. Fix the secret or the config before relying on the pause.\033[0m"
            exit 1
          fi

          echo -e "\033[32mOK: derived address matches both config pauserWallet (EVM) and tronWallets.pauserWallet (Tron).\033[0m"

      # Page on-call for real drift (scheduled / manual runs). PR runs already surface
      # the failure as a red check to the author, so we skip Slack noise there.
      - name: Notify Slack on failure
        if: ${{ failure() && github.event_name != 'pull_request' }}
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d # v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_SC_GENERAL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":rotating_light: Pauser-wallet verification FAILED — the address derived from PRIV_KEY_PAUSER_WALLET no longer matches config/global.json. The emergency pause may be unusable. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|run #${{ github.run_number }}>"
            }
