# # EMERGENCY >> Pause all PROD diamonds
# #
# # - Manually-triggered (workflow_dispatch) production break-glass: pauses EVERY production
# #   LiFiDiamond resolved from config/networks.json + deployments/<net>.json (all non-testnet
# #   EVM + Tron networks), directly from the registered PauserWallet EOA.
# # - Runs the frozen, self-contained script/emergency/emergencyPauseBreakGlass.sh, which pauses
# #   DIRECTLY from the PauserWallet (EVM via cast, Tron via troncast) — never via a Safe proposal,
# #   and intentionally independent of universalCast/helperFunctions so routing churn cannot break it.
# # - Authorization: requires typing 'UNDERSTOOD' AND membership of the lifinance/DiamondPauser team.
# # - Slack: posts a status (success/failure) with a GH run link and the runbook URL
# #   (EMERGENCY_PAUSE_RUNBOOK_URL repository variable) to the SC-general channel on every run.
# # - Known limitations: needs RPCs (MongoDB) + production deploy logs + the PRIV_KEY_PAUSER_WALLET secret.

