# EMERGENCY >> Pause all PROD diamonds
#
# ============================================================================================
# ⚠️  TEMPORARY STAGING OVERRIDE — DO NOT MERGE TO main IN THIS STATE  ⚠️
# ============================================================================================
# This is the production emergency-pause button. It is TEMPORARILY hardcoded to pause the
# STAGING diamonds so the new break-glass script (script/emergency/) can be dry-run on real
# staging chains BEFORE this branch is merged — by dispatching this already-registered workflow
# against this feature-branch ref (GitHub runs that ref's copy of the file). A new
# `environment` input can't be used for this: workflow_dispatch inputs are read from the
# DEFAULT branch, which doesn't define one yet.
#
# main's copy of this workflow is unchanged, so the live prod button still pauses PROD. The risk
# is only on merge: if this staging-hardcoded version reaches main it would neuter the prod
# pause. >>> REVERT TO PRODUCTION BEFORE MERGING <<< — undo every block tagged "TEMP-STAGING":
#   1. Re-enable the DiamondPauser membership gate (uncomment the two steps).
#   2. Pause step:  ENVIRONMENT: production  and  secret: secrets.PRIV_KEY_PAUSER_WALLET
#   3. Slack step:  webhook: secrets.SLACK_WEBHOOK_SC_GENERAL  and the PROD message text
#                   (drop the "TEST TEST TEST … STAGING" wording).
#   4. Restore the `warning` input description to the production wording.
# ============================================================================================
#
# - Runs the frozen, self-contained script/emergency/emergencyPauseBreakGlass.sh, which pauses
#   DIRECTLY from the PauserWallet EOA (EVM via cast, Tron via troncast) — never via a Safe proposal.
# - Slack includes a GH run link + the runbook URL (EMERGENCY_PAUSE_RUNBOOK_URL repo variable).
# - Known limitations: needs RPCs (MongoDB) + deploy logs + the relevant pauser secret.

name: EMERGENCY >> Pause all PROD diamonds

on:
  workflow_dispatch:
    inputs:
      # TEMP-STAGING: wording reflects the staging override. >>> REVERT: "By clicking the next
      # button you are pausing all PRODUCTION diamonds. Please proceed with extreme caution !!!
      # You must type 'UNDERSTOOD' to proceed" <<<
      warning:
        description: "TEMP STAGING DRILL — you are pausing the STAGING diamonds (bsc/arbitrum/optimism/base). Proceed with caution !!! You must type 'UNDERSTOOD' to proceed"
        required: true

permissions:
  contents: read # required to fetch repository contents
  actions: read # required to resolve the current job ID for the Slack deep-link

jobs:
  diamond-emergency-pause:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: package.json

      - name: Install dev dependencies
        run: bun install

      - name: Check input
        if: ${{ inputs.warning != 'UNDERSTOOD' }}
        run: |
          echo -e "\033[31mYou must type 'UNDERSTOOD' to proceed. Please try again. \033[0m"
          exit 1

      # TEMP-STAGING: the DiamondPauser membership gate is disabled for the staging drill.
      # >>> REVERT: uncomment both steps below to restore production authorization. <<<
      # - name: Authenticate git user (check membership in 'DiamondPauser' group)
      #   if: ${{ inputs.warning == 'UNDERSTOOD' }}
      #   id: authenticate-user
      #   uses: tspascoal/get-user-teams-membership@57e9f42acd78f4d0f496b3be4368fc5f62696662 # v3.0.0
      #   with:
      #     username: ${{ github.actor }}
      #     organization: lifinance
      #     team: diamondpauser
      #     GITHUB_TOKEN: ${{ secrets.GIT_ACTIONS_BOT_PAT_CLASSIC }}
      #
      # - name: Check team membership
      #   if: ${{ inputs.warning == 'UNDERSTOOD' }}
      #   run: |
      #     if [[ "${{ steps.authenticate-user.outputs.isTeamMember }}" != "true" ]]; then
      #       echo -e "\033[31mUser ${{ github.actor }} is not a member of the DiamondPauser team. Please ask one of the team members to execute this action:\033[0m"
      #       echo "https://github.com/orgs/lifinance/teams/diamondpauser/members"
      #       exit 1
      #     else
      #       echo -e "\033[32mUser is a member of the DiamondPauser team and may execute this action\033[0m"
      #     fi

      - name: Install Foundry
        uses: ./.github/actions/setup-foundry

      - name: Fetch RPC endpoints from MongoDB
        run: |
          # Run the fetch-rpcs.ts script to update .env with RPC endpoint variables
          # This will fetch prioritized RPCs from MongoDB, or fall back to public RPCs from networks.json if MongoDB is unavailable
          bun fetch-rpcs
          # Only inject RPC endpoint variables into the GitHub Actions environment.
          # Mask the URL (which may carry an API key) before forwarding so it is
          # redacted from all subsequent log output for the rest of the run.
          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ "$line" =~ ^ETH_NODE_URI_ ]]; then
              value="${line#*=}"
              if [[ "$value" == \"*\" ]]; then value="${value:1:-1}"; fi
              if [[ "$value" == \'*\' ]]; then value="${value:1:-1}"; fi
              echo "::add-mask::$value"
              # Write the UNQUOTED value so GITHUB_ENV matches the masked value — a quoted .env
              # value would otherwise be stored with quotes and escape the ::add-mask:: redaction.
              echo "${line%%=*}=$value" >> "$GITHUB_ENV"
            fi
          done < ".env"
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Pause Diamond
        # Frozen, self-contained break-glass script (script/emergency/) — intentionally
        # independent of universalCast/helperFunctions so routing churn cannot break the pause.
        # TEMP-STAGING: hardcoded to staging for the pre-merge dry-run.
        # >>> REVERT: ENVIRONMENT: production  and  PRIVATE_KEY_PAUSER_WALLET: secrets.PRIV_KEY_PAUSER_WALLET <<<
        run: bash script/emergency/emergencyPauseBreakGlass.sh
        env:
          ENVIRONMENT: staging
          PRIVATE_KEY_PAUSER_WALLET: ${{ secrets.PRIV_KEY_PAUSER_WALLET_STAGING }}

      # Resolve a deep-link to the current job's log view so the Slack message
      # lets on-call open logs in one click. Falls back to the run-level URL if
      # the API call fails so the notification still contains a usable link.
      - name: Resolve current job URL
        if: ${{ always() }}
        id: jobinfo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          job_id=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            --jq ".jobs[] | select(.name == \"${{ github.job }}\") | .id" 2>/dev/null || true)
          if [[ -n "${job_id}" ]]; then
            url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${job_id}"
          else
            url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Notify Slack of pause execution
        # always() so the alert fires even when the pause script exits non-zero
        # (per-network isolation can partially succeed and still return 1).
        if: ${{ always() }}
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d # v2.0.0
        # TEMP-STAGING: posts to the staging-drill test channel with a TEST message.
        # >>> REVERT: webhook -> secrets.SLACK_WEBHOOK_SC_GENERAL and use the PROD text
        #   "ATTENTION - PROD emergency-pause workflow was triggered by …" (drop "TEST … STAGING"). <<<
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_PAUSE_STAGING_TEST }}
          webhook-type: incoming-webhook
          # JSON payload so the inline ternary for status emoji interpolates cleanly. \n produces
          # line breaks. Runbook URL from the EMERGENCY_PAUSE_RUNBOOK_URL repository variable
          # (EXSC-371/EXSC-432); when unset the message says so rather than rendering a broken link.
          payload: |
            {
              "text": "TEST TEST TEST ATTENTION - the emergency diamond pause action was just executed on STAGING (bsc/arbitrum/optimism/base) by ${{ github.actor }}\nStatus: ${{ job.status == 'success' && 'Success ✅' || 'Failed ❌' }}\nGH run: ${{ steps.jobinfo.outputs.url }}\nRunbook: ${{ vars.EMERGENCY_PAUSE_RUNBOOK_URL || 'not configured — set the EMERGENCY_PAUSE_RUNBOOK_URL repository variable (EXSC-371/EXSC-432)' }}"
            }
