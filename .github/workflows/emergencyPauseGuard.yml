# Emergency-pause break-glass guard (EXSC-368)
# - Protects the frozen, self-contained emergency-pause script (script/emergency/) from two
#   failure modes:
#   - Job (isolation-guard): the break-glass script(s) must stay independent of the shared
#     scripting library. Fails if any non-comment line in script/emergency/*.sh adds a `source`
#     statement or calls universalCast / universalSend* / universalCall / universalCode /
#     sendOrPropose / references helperFunctions. This is the mechanical guarantee that
#     universalCast churn cannot break the incident-critical pause path.
#   - Job (dispatch-test): runs test/scripts/emergencyPauseBreakGlassDispatch.test.sh, which
#     proves the EVM dispatch actually signs + broadcasts against a local Anvil node and that
#     pauser-key normalization (EXSC-507) accepts valid forms / rejects malformed ones.
# - Triggers: pull_request limited to the break-glass script + its test + this workflow, and
#   workflow_dispatch (manual). No secrets or live RPCs required.
# - Note: changes to script/emergency/ also require Information Security Manager approval via
#   protectSecurityRelevantCode.yml — this workflow is the automated behavioural/isolation check.

name: Emergency-pause break-glass guard

on:
  pull_request:
    paths:
      - script/emergency/**
      - test/scripts/emergencyPauseBreakGlassDispatch.test.sh
      - .github/workflows/emergencyPauseGuard.yml
  workflow_dispatch: # manual trigger

permissions:
  contents: read # required to checkout and scan/run the scripts

jobs:
  # Mechanical isolation check: the break-glass script must not depend on the shared lib.
  isolation-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false # read-only static scan

      - name: Assert script/emergency/ is isolated from the shared library
        run: |
          set -euo pipefail
          # Forbidden in NON-COMMENT code: a `source` statement, or any call/reference to the
          # shared routing layer. Comments are stripped first so the script can explain WHY it
          # avoids the shared lib (and name those functions) without tripping the guard.
          FORBIDDEN='(^|[^[:alnum:]_])(source[[:space:]]|universalCast|universalSend|universalSendRaw|universalCall|universalCode|sendOrPropose|helperFunctions)'
          VIOLATIONS=0
          shopt -s nullglob
          for FILE in script/emergency/*.sh; do
            # Drop whole-line comments, then strip trailing inline comments (space + #...).
            CODE=$(sed -e '/^[[:space:]]*#/d' -e 's/[[:space:]]#.*$//' "$FILE")
            if echo "$CODE" | grep -nqE "$FORBIDDEN"; then
              echo "::error file=$FILE::script/emergency/ must not 'source' or call the shared routing library (universalCast/helperFunctions/sendOrPropose). The emergency pause is intentionally isolated (EXSC-367/EXSC-368)."
              echo "Offending lines in $FILE:"
              echo "$CODE" | grep -nE "$FORBIDDEN" || true
              VIOLATIONS=1
            fi
          done
          if [[ "$VIOLATIONS" -ne 0 ]]; then
            exit 1
          fi
          echo "Isolation guard passed: script/emergency/ has no shared-library dependency."

  # Behavioural check: the EVM dispatch broadcasts + key normalization works.
  dispatch-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false # read-only; no live RPC/secrets needed

      - name: Install Foundry
        uses: ./.github/actions/setup-foundry

      - name: Run break-glass dispatch smoke test
        run: bash test/scripts/emergencyPauseBreakGlassDispatch.test.sh
