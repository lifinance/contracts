# Verify Emergency Pause Readiness (Staging)
# - STAGING, read-only counterpart to verifyEmergencyPauseReadiness.yml. Runs
#   script/utils/verifyEmergencyPauseReadinessStagingGitHub.sh.
# - Verifies that each target staging diamond's on-chain pauserWallet() equals the address
#   derived from the STAGING pauser secret (PRIV_KEY_PAUSER_WALLET_STAGING). Scope: bsc, base,
#   optimism, arbitrum staging diamonds.
# - Staging has no pauser entry in config/global.json (no offline layer) and staging diamonds
#   are not Safe/timelock-governed (no governance layer), so this is a single on-chain check.
# - Uses the STAGING key so it never touches the production pauser wallet. Read-only regardless.
# - Known limitations: needs RPCs (MongoDB); transient RPC errors are retried then failed hard.

name: Verify Emergency Pause Readiness (Staging)

on:
  schedule:
    - cron: '0 9 * * 4' # 09:00 UTC every Thursday
  workflow_dispatch: # manual trigger (e.g. after rotating the staging key)
  pull_request:
    paths:
      - script/utils/verifyEmergencyPauseReadinessStagingGitHub.sh
      - script/universalCast.sh
      - script/helperFunctions.sh
      - .github/workflows/verifyEmergencyPauseReadinessStaging.yml

permissions:
  contents: read # required to checkout the repository and read staging deploy logs

jobs:
  verify-emergency-pause-readiness-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false # read-only check; no git push/tag/submodule operations

      - name: Set up Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2

      - name: Install dev dependencies
        run: bun install

      - name: Install Foundry
        uses: ./.github/actions/setup-foundry

      - name: Fetch RPC endpoints from MongoDB
        run: |
          # Run the fetch-rpcs.ts script to update .env with RPC endpoint variables
          # This will fetch prioritized RPCs from MongoDB, or fall back to public RPCs from networks.json if MongoDB is unavailable
          bun fetch-rpcs
          # Only inject RPC endpoint variables into the GitHub Actions environment.
          # Mask the URL (which may carry an API key) before forwarding so it is
          # redacted from all subsequent log output for the rest of the run.
          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ "$line" =~ ^ETH_NODE_URI_ ]]; then
              value="${line#*=}"
              if [[ "$value" == \"*\" ]]; then value="${value:1:-1}"; fi
              if [[ "$value" == \'*\' ]]; then value="${value:1:-1}"; fi
              echo "::add-mask::$value"
              echo "$line" >> "$GITHUB_ENV"
            fi
          done < ".env"
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Verify staging emergency pause readiness
        run: bash script/utils/verifyEmergencyPauseReadinessStagingGitHub.sh
        env:
          PRIVATE_KEY_PAUSER_WALLET_STAGING: ${{ secrets.PRIV_KEY_PAUSER_WALLET_STAGING }}

      # Page on-call for real drift (scheduled / manual runs). PR runs already surface
      # the failure as a red check to the author, so we skip Slack noise there.
      - name: Notify Slack on failure
        if: ${{ failure() && github.event_name != 'pull_request' }}
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d # v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_SC_GENERAL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":rotating_light: STAGING emergency pause readiness check FAILED — a staging diamond's pauserWallet no longer matches the staging key. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|run #${{ github.run_number }}>"
            }
