# Composite action: install pinned foundry + verify
# - Reads .foundry-version from the checked-out repo
# - Installs foundry at that version via foundry-rs/foundry-toolchain
# - Verifies the installed binary matches the pin (catches action regressions or input typos)
# Used by every workflow that needs forge/cast/anvil so a single pin source
# (.foundry-version) flows everywhere.
name: Setup Foundry
description: Install pinned foundry from .foundry-version and verify the installed binary matches.

runs:
  using: composite
  steps:
    - name: Read pinned foundry version
      id: pin
      shell: bash
      run: |
        set -euo pipefail
        version="$(tr -d '[:space:]' < .foundry-version)"
        if [ -z "$version" ]; then
          echo "::error::.foundry-version is empty"
          exit 1
        fi
        echo "version=${version}" >> "$GITHUB_OUTPUT"

    # EXPERIMENT: pin to v1.3.1 (matches main's prior forge.yml) without `version:`
    # to test cache-continuity hypothesis. v1.3.1 builds release URLs without a `v`
    # prefix so it can't accept `1.7.1` directly; defaulting to `stable` channel,
    # which currently resolves to 1.7.1. Verify step below will catch any drift.
    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@de808b1eea699e761c404bda44ba8f21aba30b2c # v1.3.1

    - name: Verify foundry version
      shell: bash
      run: bash script/utils/verify-foundry-version.sh
