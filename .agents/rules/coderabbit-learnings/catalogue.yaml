      _вЪ†пЄП Potential issue_ | _рЯЯ† Major_ | _вЪ° Quick win_
      
      <details>
      <summary>рЯІ© Analysis chain</summary>
      
      рЯМР Web query:
      
      `GitHub Docs: For REST endpoint "List commits on a pull request", what GITHUB_TOKEN permissions are required in Actions workflows? Confirm whether "pull-requests: read" is required and whether "contents: read" alone is sufficient.`
      
      рЯТ° Result:
      
      To call the REST endpoint "List commits on a pull request" (GET /repos/{owner}/{repo}/pulls/{pull_number}/commits) from a GitHub Actions workflow using the built-in GITHUB_TOKEN, the GITHUB_TOKEN permissions you should grant are: 1) Confirm whether "pull-requests: read" is required Yes. Community examples that directly call the endpoint via curl in Actions show that job-level permissions include pull-requests: read specifically вАЬto get commits data by curl requestвАЭ for this endpoint [1]. 2) Confirm whether "contents: read" alone is sufficient The evidence found does not support that contents: read alone is sufficient for this endpoint. The same Actions example includes both contents: read and pull-requests: read, where contents: read is described as вАЬnot sure if вА¶ necessary,вАЭ while pull-requests: read is described as the permission needed to fetch PR commits via the PR commits endpoint [1]. What I could not directly confirm from official GitHub Docs in the sources retrieved: - A GitHub Docs page that explicitly maps the endpoint (GET /repos/{owner}/{repo}/pulls/{pull_number}/commits) to the exact Actions GITHUB_TOKEN permission (pull-requests: read vs contents: read) in a single authoritative table. Practical recommendation Set job permissions to: permissions: pull-requests: read Optionally also set contents: read if your workflow otherwise needs repository content access (checkout, reading files, etc.), but based on the available evidence, pull-requests: read is the permission tied to reading the PR commits [1].
      
      Citations:
      
      - 1: https://stackoverflow.com/questions/63619329/how-to-get-the-commit-message-in-github-actions
      
      ---
      
      рЯПБ Script executed:
      
      ```shell
      #!/bin/bash
      set -euo pipefail
      FILE=".github/workflows/verifyCommitsSigned.yml"
      echo "== File: $FILE =="
      nl -ba "$FILE" | sed -n '1,220p'
      ```
      
