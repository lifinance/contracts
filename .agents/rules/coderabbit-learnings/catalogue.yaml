      `encodeFunctionData()` derives the selector by hex-encoding the ASCII function signature (`Buffer.from(signature) вА¶`) instead of taking the first four bytes of the *keccak-256* hash.  
      Consequences:  
      
      1. The selector is wrong вЖТ `estimateGas()` (and any other raw call that might reuse this helper) silently simulates a call to a non-existent function and always reverts with zero-gas usage, giving misleading вАЬsuccessвАЭ results.  
      2. Any future usage that relies on the helper to craft calldata will fail on-chain.
      
      Fix:
      
