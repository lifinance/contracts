    title: "_вЪ†пЄП Potential issue_ | _рЯЯ† Major_ | _вЪ° Quick win_ <details> <summary>рЯІ© Analysis chain</summary> рЯМР Web query: `GitHub Docs: For REST endpoint \"List commits on a pull request\", what GITHUB_TOKEN permi"
