            transactionId: string
            safeTxHash: string
            executionHash?: string
          }>
        ): Promise<void> {
          const message: ISlackMessage = {
            text: `вЭМ ${network}: ${operations.length} operation(s) not scheduled in timelock`,
            blocks: [
