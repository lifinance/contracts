      +      rootstock: 'https://rootstock.blockscout.com/tx/',
      +      gravity: 'https://scan.gravity.xyz/tx/',
      +      worldchain: 'https://worldchain-mainnet.explorer.alchemy.com/tx/',
      +    }
      +    const explorerUrl = explorers[network.toLowerCase()]
      +    return explorerUrl ? `${explorerUrl}${txHash}` : undefined
      +  }
      +
      +  private truncateHash(hash: string): string {
      +    if (hash.length <= 10) return hash
      +    return `${hash.slice(0, 6)}...${hash.slice(-4)}`
      +  }
      +
      +  private truncateAddress(address: string): string {
      +    if (address.length <= 10) return address
      +    return `${address.slice(0, 6)}...${address.slice(-4)}`
      +  }
      +
      +  private extractErrorMessage(error: unknown): string {
      +    if (!error) return 'Unknown error'
      +    if (typeof error === 'string') return error
      +    const errorObj = error as Record<string, unknown>
      +    if (typeof errorObj.message === 'string') return errorObj.message
      +    if (typeof errorObj.reason === 'string') return errorObj.reason
      +    if (typeof errorObj.shortMessage === 'string') return errorObj.shortMessage
      +    if (typeof errorObj.details === 'string') return errorObj.details
      +    try {
      +      return JSON.stringify(errorObj).slice(0, 500)
      +    } catch {
      +      return String(errorObj)
      +    }
      +  }
      +
      +  private formatDuration(seconds: number): string {
      +    const hours = Math.floor(seconds / 3600)
      +    const minutes = Math.floor((seconds % 3600) / 60)
      +    const secs = seconds % 60
      +    const parts: string[] = []
      +    if (hours > 0) parts.push(`${hours}h`)
      +    if (minutes > 0) parts.push(`${minutes}m`)
      +    parts.push(`${secs}s`)
      +    return parts.join(' ')
      +  }
      +}
