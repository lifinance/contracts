    rationale: |
      _вЪ†пЄП Potential issue_
      
      **Here-doc is quoted вЖТ variables wonвАЩt expand & title gets double-quoted**
      
      Two issues break PR creation:  
      
      1. Using `<< 'EOF'` (single-quoted) suppresses variable expansion. `$ORIGINAL_PR_NUMBER`, `$ORIGINAL_PR_URL`, `$ORIGINAL_AUTHOR`, and `$PR_BODY` will be copied verbatim instead of being interpolated.  
      2. `printf '%q'` returns a shell-escaped string *including* quotes; wrapping that result again in `"..."` produces a title like `"'My PR Title'"`.
      
      Diff to fix both problems:
      
      ```diff
      -          # Safely escape PR title for shell usage
      -          PR_TITLE=$(printf "%q" "${{ github.event.pull_request.title }}")
      +          # Use the raw title but pass it in quoted context
      +          PR_TITLE="${{ github.event.pull_request.title }}"
      
      -          cat > /tmp/pr_body.md << 'EOF'
      +          cat > /tmp/pr_body.md <<EOF
       > рЯФД This PR was created automatically from external PR [#$ORIGINAL_PR_NUMBER]($ORIGINAL_PR_URL) for CI/security purposes.
      
       Original PR by $ORIGINAL_AUTHOR: $ORIGINAL_PR_URL
      
       ---
       
       $PR_BODY
       EOF
      ```
      
      This restores variable expansion and prevents accidental quote-in-title artifacts.
      
      <!-- suggestion_start -->
      
      <details>
      <summary>рЯУЭ Committable suggestion</summary>
      
