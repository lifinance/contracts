    title: "_вЪ†пЄП Potential issue_ | _рЯЯ† Major_ **Add selector/signature validation for Composer entries (parity with periphery contracts)** `getComposerContractsForNetwork` currently checks Composer selector *form"
    category: security
    severity: high
    applies_to:
