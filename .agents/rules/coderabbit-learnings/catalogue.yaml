      function getConstructorArgsFromMasterLog() {
        # read function arguments into variables
        local CONTRACT="$1"
        local NETWORK="$2"
        local ENVIRONMENT="$3"
        local VERSION="${4:-}"
      
        # Fallback to highest deployed version if not provided
        if [ -z "$VERSION" ]; then
          VERSION=$(getHighestDeployedContractVersionFromMasterLog "$NETWORK" "$ENVIRONMENT" "$CONTRACT") || return 1
          if [ -z "$VERSION" ]; then
            error "Could not determine version for $CONTRACT on $NETWORK/$ENVIRONMENT"
            return 1
          fi
        fi
      
        # Ensure deployment log exists
        if [ -z "$LOG_FILE_PATH" ] || [ ! -f "$LOG_FILE_PATH" ]; then
          error "deployments log file not found: $LOG_FILE_PATH"
          return 1
        fi
      
        # Extract constructor arguments
        local CONSTRUCTOR_ARGS
        CONSTRUCTOR_ARGS=$(jq -r --arg CONTRACT "$CONTRACT" \
          --arg NETWORK "$NETWORK" \
          --arg ENVIRONMENT "$ENVIRONMENT" \
          --arg VERSION "$VERSION" \
          '.[$CONTRACT][$NETWORK][$ENVIRONMENT][$VERSION][0].CONSTRUCTOR_ARGS' \
          "$LOG_FILE_PATH") || return 1
      
        if [ -z "$CONSTRUCTOR_ARGS" ]; then
          return 1
        fi
      
        echo "$CONSTRUCTOR_ARGS"
        return 0
      }
