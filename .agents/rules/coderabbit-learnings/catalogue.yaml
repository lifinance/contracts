    rationale: |
      _рЯЫ†пЄП Refactor suggestion_
      
      **You add --verifier-url, but not the matching --verifier type**
      
      For OkLink (and other non-etherscan verifiers), forge typically needs both the verifier type and the URL. YouвАЩre parsing the URL via getVerifierUrl but never set --verifier oklink. Parse and pass the per-network verifier too to avoid flaky verification.
      
      
      ```diff
         # Add verifier URL if available (for custom verifiers like oklink)
         local VERIFIER_URL
         VERIFIER_URL=$(getVerifierUrl "$NETWORK" 2>/dev/null)
         if [ $? -eq 0 ] && [ -n "$VERIFIER_URL" ]; then
           VERIFY_CMD+=("--verifier-url" "$VERIFIER_URL")
         fi
      +
      +# Add verifier type if available (e.g., oklink, blockscout, zksync, sourcify)
      +local VERIFIER_TYPE
      +VERIFIER_TYPE=$(getVerifierType "$NETWORK" 2>/dev/null)
      +if [ $? -eq 0 ] && [ -n "$VERIFIER_TYPE" ]; then
      +  VERIFY_CMD+=("--verifier" "$VERIFIER_TYPE")
      +fi
      ```
      
      Add this helper (near getVerifierUrl):
      
      ```diff
      +function getVerifierType() {
      +  local NETWORK="$1"
      +  if [[ -z "$NETWORK" ]]; then
      +    echo "Usage: getVerifierType <network>" >&2
      +    return 1
      +  fi
      +  if [[ -z "$FOUNDRY_TOML_FILE_PATH" ]]; then
      +    echo "Please set FOUNDRY_TOML_FILE_PATH in the config.sh file (see config.example.sh)" >&2
      +    return 1
      +  fi
      +  local LINE
      +  LINE=$(awk -v net="$NETWORK" '
      +    $0 ~ "\\[etherscan\\]" { in_etherscan=1; next }
      +    in_etherscan && /^\[/ { in_etherscan=0 }
      +    in_etherscan && $0 ~ "^[[:space:]]*"net"[[:space:]]*=" { print; exit }
      +  ' "$FOUNDRY_TOML_FILE_PATH")
      +  if [[ -z "$LINE" ]]; then
      +    echo "Error: Could not find [etherscan].$NETWORK in foundry.toml" >&2
      +    return 1
      +  fi
      +  local TYPE
      +  TYPE=$(echo "$LINE" | sed -n 's/.*verifier *= *"\([^"]*\)".*/\1/p')
      +  [[ -z "$TYPE" ]] && return 1 || echo "$TYPE"
      +}
      ```
      
