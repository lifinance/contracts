      +import { keccak256, toBytes } from 'viem'
      
      -  // Calculate the function selector (first 4 bytes of the keccak256 hash of the signature)
      -  const selector = `0x${Buffer.from(signature).toString('hex').slice(0, 8)}`
      +  // Correct selector = first 4 bytes of keccak256 hash of the signature
      +  const selector = keccak256(toBytes(signature)).slice(0, 10) // 0x + 8 hex chars
      ```
      
      Even better: drop this custom helper altogether and use viemвАЩs built-in `encodeFunctionData()`:
      
      ```diff
