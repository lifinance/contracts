      ---
      
      рЯМР Web query:
      
      `GitHub Actions GITHUB_TOKEN permissions required for REST endpoint GET /repos/{owner}/{repo}/pulls/{pull_number}/commits "pull-requests: read"`
      
      рЯТ° Result:
      
      To use the GitHub Actions GITHUB_TOKEN to access the REST endpoint GET /repos/{owner}/{repo}/pulls/{pull_number}/commits, you must explicitly grant the pull-requests: read permission in your workflow file [1]. While the GITHUB_TOKEN has default permissions that vary based on repository settings (often read-only for contents and packages), accessing specific pull request details via the API typically requires the pull-requests scope to be set to read [2][3][1]. You can configure this by adding a permissions block to your workflow or specific job [4][5]: permissions: pull-requests: read If you are encountering a "Resource not accessible by integration" or 403 Forbidden error, it is almost certainly because this permission is missing or restricted [5][1]. Important considerations: - Scope Limitation: The GITHUB_TOKEN is limited to the repository where the workflow is running [2][6]. It cannot be used to access pull requests in different repositories, even if they are in the same organization [6]. For cross-repository access, you must use a Personal Access Token (PAT) or a GitHub App token stored as a repository secret [2][6]. - Forked PRs: Workflows triggered by pull requests from forked repositories may have restricted permissions by default (often read-only for all scopes) to prevent unauthorized access, regardless of your workflow's permission settings, unless the "Send write tokens to workflows from pull requests" setting is enabled in the repository [7]. - Principle of Least Privilege: Always grant only the minimum permissions required for your workflow to function [4][1]. Adding pull-requests: read is the specific, minimal requirement for the requested endpoint [1].
      
      Citations:
      
      - 1: https://github.com/github/gh-aw/pull/10020
      - 2: https://docs.github.com/en/enterprise-server@3.0/actions/reference/authentication-in-a-workflow
      - 3: https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/enabling-features-for-your-repository/managing-github-actions-settings-for-a-repository
      - 4: https://github.com/github/docs/blob/main/content/actions/tutorials/authenticate-with-github_token.md
      - 5: https://stackoverflow.com/questions/70435286/resource-not-accessible-by-integration-on-github-post-repos-owner-repo-ac
      - 6: https://stackoverflow.com/questions/79398211/github-actions-permissions-to-read-an-issue-from-a-private-repo-within-the-same
      - 7: https://github.com/github/docs/issues/32398
      
