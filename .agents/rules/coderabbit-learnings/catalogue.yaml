      )
      
      # Build address->Name map from diamond
      jq -r '.LiFiDiamond.Facets | to_entries[] | "\(.key)=\(.value.Name)"' deployments/mainnet.diamond.json > /tmp/diamond_addr_name
      
      fail=0
      for name in "${NAMES[@]}"; do
        addr=$(grep "^${name}=" /tmp/mainnet_kv | cut -d= -f2- || true)
        [ -z "$addr" ] && { echo "[MISS] ${name} not in mainnet.json"; fail=1; continue; }
        found=$(grep -i "^${addr}=" /tmp/diamond_addr_name | cut -d= -f2- || true)
        if [ "$found" != "$name" ]; then
          echo "[MISMATCH] ${name} -> ${addr} not mapped as '${name}' in mainnet.diamond.json (got '${found:-absent}')"
          fail=1
        else
          echo "[OK] ${name} matches at ${addr}"
        fi
      done
      exit $fail
