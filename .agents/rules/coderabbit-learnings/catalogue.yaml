      рЯПБ Script executed:
      
      ```shell
      #!/bin/bash
      set -euo pipefail
      
      jq -r 'to_entries[] | "\(.key)=\(.value)"' deployments/mainnet.json > /tmp/mainnet_kv
      
      # Names we expect to be present in the diamond facets with matching addresses
      NAMES=(
        WithdrawFacet CBridgeFacet GenericSwapFacet HopFacet OmniBridgeFacet OptimismBridgeFacet PolygonBridgeFacet
