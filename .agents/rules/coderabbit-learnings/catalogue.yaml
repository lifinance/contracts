      Per coding guidelines: "Every `uses:` reference in GitHub Actions workflows MUST use a full 40-character commit SHA, never tags (e.g., `@v4`, `@main`) or short SHAs. Format: `owner/repo@<full-40-char-sha>` with optional trailing comment for traceability (e.g., `# v4.1.7`)"
      
      Additionally, using `bun-version: latest` (line 26) can introduce instability. Consider pinning to a specific stable version.
      
      As per coding guidelines: "Every `uses:` reference in GitHub Actions workflows MUST use a full 40-character commit SHA, never tags"
      
      
      
      
      Run the following script to find the correct commit SHAs for these actions:
      
      ```shell
      #!/bin/bash
      # Description: Fetch the latest commit SHAs for the actions used in this workflow
      
      echo "=== actions/checkout v4 ==="
      gh api repos/actions/checkout/git/refs/tags/v4 --jq '.object.sha' 2>/dev/null || echo "Tag v4 not found, checking latest v4.x.x"
      gh api repos/actions/checkout/releases/latest --jq '.tag_name' 2>/dev/null
      
      echo ""
      echo "=== oven-sh/setup-bun v2 ==="
