    rationale: |
      _вЪ†пЄП Potential issue_ | _рЯЯ† Major_
      
      **Add selector/signature validation for Composer entries (parity with periphery contracts)**
      
      `getComposerContractsForNetwork` currently checks Composer selector *format* via `isValidSelector` but does not enforce that the selector actually matches the provided `signature`, while `processDeploymentFile` *does* enforce this with `validateSelector`. That means a wrong Composer function signature (e.g. typo in `runVM(...)`) would silently pass and end up in `whitelist.json`, weakening config correctness and protections compared to other periphery contracts.
      
      To bring Composer validation in line with existing periphery validation and fail fast on bad config, consider:
      
      - Enforcing `functionSelectors` to be a nonвАСempty array.
      - Requiring a nonвАСempty `signature` for each selector.
      - Using `validateSelector` to ensure selector/signature consistency.
      
      Example patch:
      
      ```diff
       function getComposerContractsForNetwork(networkName: string): IContractData[] {
         const composerConfigs =
           (composerWhitelist as unknown as IComposerWhitelist)[networkName] || []
      
         if (!Array.isArray(composerConfigs) || composerConfigs.length === 0) {
           return []
         }
      
      -  return composerConfigs.map(({ address, functionSelectors }) => {
      +  return composerConfigs.map(({ address, functionSelectors }) => {
           // Validate address
           if (!isValidEthereumAddress(address)) {
             throw new Error(`Invalid Composer address for ${networkName}: ${address}`)
           }
       
      -    // Validate selectors and map into ISelectorData[]
      -    const selectors: ISelectorData[] = functionSelectors.map(
      -      ({ selector, signature }) => {
      -        if (!isValidSelector(selector)) {
      -          throw new Error(
      -            `Invalid Composer selector for ${networkName}: ${selector}`
      -          )
      -        }
      -
      -        return {
      -          selector,
      -          signature: signature || '',
      -        }
      -      }
      -    )
      +    if (!Array.isArray(functionSelectors) || functionSelectors.length === 0) {
      +      throw new Error(
      +        `Composer functionSelectors missing or empty for ${networkName}: ${address}`
      +      )
      +    }
      +
      +    // Validate selectors and map into ISelectorData[]
      +    const selectors: ISelectorData[] = functionSelectors.map(
      +      ({ selector, signature }) => {
      +        if (!isValidSelector(selector)) {
      +          throw new Error(
      +            `Invalid Composer selector for ${networkName}: ${selector}`
      +          )
      +        }
      +        if (!signature) {
      +          throw new Error(
      +            `Missing Composer selector signature for ${networkName}: ${selector}`
      +          )
      +        }
      +        if (!validateSelector(selector, signature)) {
      +          throw new Error(
      +            `Selector mismatch for Composer on ${networkName}: ${selector} != ${signature}`
      +          )
      +        }
      +
      +        return {
      +          selector,
      +          signature,
      +        }
      +      }
      +    )
       
           return {
             name: 'Composer',
             address,
             selectors,
           }
         })
       }
      ```
      
      This keeps Composer config validation at least as strict as existing periphery validation and helps catch misconfigured selectors early.
      
      
      
