rules:
  - id: lf-053-loop-msg-value
    languages: [solidity]
    severity: ERROR
    message: |
      `{value: msg.value}` forwarded inside a loop. `msg.value` is constant
      for the whole transaction — using it as a per-item budget lets a
      caller pay once and "spend" it N times across iterations.

      Compute the cumulative requirement outside the loop, or distribute
      the value explicitly and assert `sum == msg.value` after the loop.

      Source: LF-053 (audit20251119 — LiFiIntentEscrowFacet batch-deposit).
      Pattern: `{value: msg.value}` invocation INSIDE a for/while/do-while.
    metadata:
      lf-id: LF-053
      audit: audit20251119
      cwe: CWE-682
      # EXP-484 tuning notes:
      # - Previous rule fired on ANY `{value: msg.value}(...)` invocation,
      #   including single-swap entry points where there's no iteration.
      #   Evidence: PR #1715 (GenericSwapFacetV3) hit one FP at L172 inside
      #   `swapTokensSingleV3NativeMin` — a single-swap function, no loop.
      # - Fix: add a `pattern-inside` requiring a parent loop construct.
      #   Eliminates the single-swap FP class; the actual hazardous shape
      #   (`for (...) { ... .call{value: msg.value}(...) ... }`) is still
      #   caught.
    patterns:
      - pattern-either:
          - pattern: "$F{value: msg.value}(...)"
          - pattern: "$C.$F{value: msg.value}(...)"
      # Require an enclosing iterating construct.
      - pattern-either:
          - pattern-inside: |
              for (...) { ... }
          - pattern-inside: |
              while (...) { ... }
          - pattern-inside: |
              do { ... } while (...);
    paths:
      include:
        - "src/Facets/**"
        - "src/Periphery/**"
      exclude:
        - "**/*.t.sol"
