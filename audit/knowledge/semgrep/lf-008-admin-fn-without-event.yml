rules:
  - id: lf-008-admin-fn-without-event
    languages: [generic]
    severity: INFO
    message: |
      State-mutating function appears to be gated by an admin-only modifier
      (`onlyOwner` / `onlyRole` / `onlyAdmin`) but no `emit` is present in
      the function body. Admin operations should be observable on-chain
      for monitoring, governance UIs, and forensic timelines.

      Add an event matching the change and emit it inside the function.

      Source: LF-008 + recurrences. Pattern: admin-modifier function
      without `emit`. Generic-language match — false positives expected
      on tight functions; triage with diff context.
    metadata:
      lf-id: LF-008
      audit: audit20240201
      cwe: CWE-778
    pattern: |
      function $F (...) ... onlyOwner ... {
        ...
      }
    paths:
      include:
        - "src/Facets/**"
        - "src/Periphery/**"
        - "src/Security/**"
      exclude:
        - "**/*.t.sol"
        - "src/Interfaces/**"
    # Generic-mode caveat: Semgrep's experimental Solidity parser doesn't
    # parse modifier-with-args reliably. This rule is intentionally
    # lower-precision; treat hits as triage candidates, not confirmed bugs.
    # EXP-484 (tune) should refine this once we have a baseline.
