rules:
  - id: lf-002-direct-ierc20-approve
    languages: [solidity]
    severity: WARNING
    message: |
      Direct `IERC20(...).approve(...)` / `.transfer(...)` / `.transferFrom(...)`
      on user-supplied tokens breaks for non-standard ERC20 implementations
      that don't return bool (USDT, BNB), revert on non-zeroâ†’non-zero allowance
      change (USDT), or charge fee-on-transfer.

      Use `SafeERC20.safeTransfer`/`safeTransferFrom`/`forceApprove`
      (or solady's `SafeTransferLib`) â€” these handle the non-standard cases.

      Source: LF-002 (audit20240201 â€” LiFiDexAggregator/RouteProcessor4).
      Pattern: direct IERC20 call on arbitrary token without SafeERC20 wrap.
    metadata:
      lf-id: LF-002
      audit: audit20240201
      cwe: CWE-252
    # metavariable-pattern must be AND-joined under `patterns:` with the
    # pattern that binds $TOKEN â€” as a top-level sibling of pattern-either it
    # is silently ignored (see lf-046 tuning notes). The IERC20(...) casts are
    # already specific, so the name constraint only wraps the bare-variable
    # patterns where $TOKEN is unbound otherwise.
    pattern-either:
      - pattern: IERC20($T).approve($S, $A)
      - pattern: IERC20($T).transfer($R, $A)
      - pattern: IERC20($T).transferFrom($F, $R, $A)
      - patterns:
          - pattern-either:
              - pattern: $TOKEN.approve($S, $A)
              - pattern: $TOKEN.transfer($R, $A)
              - pattern: $TOKEN.transferFrom($F, $R, $A)
          # Only flag when the receiver looks like a token variable. The
          # leading `.*` is required: metavariable-regex is anchored at the
          # start (re.match), so a bare alternation misses names like
          # `inputToken` where the keyword is not the prefix.
          - metavariable-regex:
              metavariable: $TOKEN
              regex: "(?i).*(token|asset|erc20|currency).*"
    paths:
      include:
        - "src/Facets/**"
        - "src/Periphery/**"
        - "src/Libraries/**"
      exclude:
        - "**/*.t.sol"
        - "src/Interfaces/**"
