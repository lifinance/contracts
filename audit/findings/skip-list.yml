# LI.FI static-analysis rule skip list
#
# Two layers of FP suppression keep CI cost down:
#
#   1. TOOL-LEVEL  — Slither runs with `--exclude-informational --exclude-low`
#                    (see .github/workflows/security-review.yml). This drops
#                    pure-style + low-impact detectors at the source. Most of
#                    Slither's noise (naming-convention, too-many-digits,
#                    reentrancy-events, calls-loop, assembly, low-level-calls,
#                    etc.) is eliminated here.
#
#   2. SKILL-LEVEL — This file. Only used for findings the tool config keeps
#                    but we want to suppress (semgrep custom rules) or
#                    findings we want to KEEP in SARIF for visibility but
#                    NOT route through fp-check (cost).
#
# Use audit/findings/waived.yml for *finding-level* suppression (specific
# file:line). Use audit/knowledge/semgrep/lf-*.yml to fix Semgrep rule
# patterns when they're systematically over-broad (EXP-484).
#
# Schema:
#   - tool: slither | semgrep
#     rule: <rule-id from the tool>
#     action: drop | demote
#     rationale: |
#       Multi-line justification. Required.
#     review_ticket: EXP-NNN (optional — link to a tuning ticket)

# ---- Slither ------------------------------------------------------------

# Note: most Slither noise is dropped by --exclude-informational --exclude-low
# at the tool level. Entries here are only for detectors that survive the
# tool filter but we've decided to suppress/demote for LI.FI-specific reasons.

# Currently no Slither entries — the tool config catches everything we want
# to filter. If a Medium- or High-impact Slither detector turns out to be
# systematically false-positive for LI.FI patterns, add it here.
#
# Candidates flagged by past dry-runs but not yet promoted (pending real-PR
# evidence under EXP-484):
#
# - missing-zero-check (Medium impact): many LI.FI constructor params are
#   documented as "can be address(0) on chains where upstream is unavailable".
#   If this detector becomes the dominant cost driver, demote.
#
# - divide-before-multiply (Medium impact): matches our (a * BASE) / b
#   fixed-point idiom (which is correctly multiply-before-divide); Slither's
#   AST match is over-broad. Promote if cost-relevant.

# ---- Semgrep (LI.FI custom rules) ---------------------------------------

# Semgrep findings come from our own LF-NNN-derived rules. We don't suppress
# them here — when a rule is systematically too noisy, fix the rule in
# audit/knowledge/semgrep/ rather than suppress per-finding.
#
# Open EXP-484 tuning items (rule patterns to tighten, not suppress here):
#
# - lf-046-bytes32-nonevm-receiver — over-broad for protocols that natively
#   use bytes32 receivers (CCTP, Across V4, LayerZero, Wormhole). Needs
#   `metavariable-pattern` scoping to non-EVM destinations only.
#   Evidence: PR #1731 (PolymerCCTP) hit 4 FPs at lines 28, 43, 45, 214.
#
# - lf-029-shared-modifier-parallel-fields — matches signed-payload-binding
#   patterns where _bridgeData.receiver is included in
#   keccak256(abi.encode(...)) for EIP-712, AND matches code-path
#   divergence inside if/else (not a parallel-field bug). Needs
#   `pattern-not-inside` to exclude.
#   Evidence: PR #1731 hit 4 FPs at lines 194, 196, 203, 255 (all in
#   if/else branches, not parallel reads).
#
# - lf-053-loop-msg-value — matches single-swap `.call{value: msg.value}`
#   sites (not in loops). Pattern should require an enclosing for/while.
#   Evidence: PR #1715 hit 1 FP at line 172 (single-swap entry function).
